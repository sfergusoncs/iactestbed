trigger: none

parameters:
  - name: environment
    displayName: 'Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - uat
      - qa
      - prod
      - sandbox

  - name: subscriptionId
    displayName: 'Target Subscription ID'
    type: string
    default: ''

  - name: confirm
    displayName: 'Type the environment name to confirm'
    type: string
    default: ''

pool:
  vmImage: ubuntu-latest
  name: default

variables:
  serviceConnection: 'sandman-sc-${{ parameters.environment }}'
  hubServiceConnection: 'sandman-sc-hub'
  location: 'southcentralus'
  rsvRG: 'sandman-rg-rsv-${{ parameters.environment }}'

stages:

  # Validate confirmation before touching anything
  - stage: Validate
    displayName: 'Validate Confirmation'
    jobs:
      - job: ConfirmDestruction
        displayName: 'Check confirmation matches environment'
        steps:
          - script: |
              if [ "${{ parameters.confirm }}" != "${{ parameters.environment }}" ]; then
                echo "##[error] Confirmation '${{ parameters.confirm }}' does not match environment '${{ parameters.environment }}'. Aborting."
                exit 1
              fi
              echo "Confirmation matched. Proceeding with teardown of ${{ parameters.environment }} in subscription ${{ parameters.subscriptionId }}."
            displayName: 'Validate Confirmation'

        # Delete Hub to Spoke Peering
          - task: AzureCLI@2
            displayName: 'Delete Hub to Spoke Peering'
            inputs:
              azureSubscription: $(hubServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az network vnet peering delete \
                  --name sandman-peer-to-${{ parameters.environment }} \
                  --resource-group sandman-rg-hub \
                  --vnet-name sandman-vnet-hub || echo "Peering not found, skipping"

  # Teardown all resource groups except RSV
  - stage: Teardown
    displayName: 'Teardown ${{ parameters.environment }}'
    dependsOn: Validate
    jobs:
      - job: DeleteResourceGroups
        displayName: 'Delete resource groups'
        steps:
          - task: AzureCLI@2
            displayName: 'List resource groups to be deleted'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                EXCLUDE="$(rsvRG)"

                echo "The following resource groups will be deleted:"
                az group list \
                  --subscription ${{ parameters.subscriptionId }} \
                  --query "[].name" -o tsv | \
                  grep -v "$EXCLUDE"

                echo "The following resource groups will be preserved:"
                echo "$EXCLUDE"

          - task: AzureCLI@2
            displayName: 'Delete resource groups'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                EXCLUDE="$(rsvRG)"

                az group list \
                  --subscription ${{ parameters.subscriptionId }} \
                  --query "[].name" -o tsv | \
                  grep -v "$EXCLUDE" | \
                  xargs -I {} az group delete \
                    --name {} \
                    --subscription ${{ parameters.subscriptionId }} \
                    --yes

                echo "Teardown complete. $EXCLUDE preserved."

          - task: AzureCLI@2
            displayName: 'Purge Key Vault'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az keyvault purge \
                  --name sandman-kv-${{ parameters.environment }} \
                  --location $(location) \
                  --subscription ${{ parameters.subscriptionId }}