trigger: none

parameters:
  - name: environment
    displayName: 'Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - uat
      - prod
      - sandbox

    
  - name: deployVnet
    displayName: 'Deploy VNet'
    type: boolean
    default: 'true'
  - name: deployACR
    displayName: 'Deploy ACR'
    type: boolean
    default: 'true'
  - name: deployRedis
    displayName: 'Deploy Redis'
    type: boolean
    default: 'true'
  - name: deployAKS
    displayName: 'Deploy AKS'
    type: boolean
    default: 'true'
  - name: deployBlobCache
    displayName: 'Deploy Blob Cache'
    type: boolean
    default: 'true'
  - name: deployBlobPerm
    displayName: 'Deploy Blob Perm'
    type: boolean
    default: 'true'

  - name: subscriptionId
    displayName: 'Target Subscription ID'
    type: string
    default: ''

  - name: hubSubscriptionId
    displayName: 'Hub Subscription ID'
    type: string
    default: 'c290fb32-8a22-4aeb-9147-d6d4e54071dd' 

pool:
  vmImage: ubuntu-latest

variables:
  serviceConnection: 'sandman-sc-${{ parameters.environment }}'
  hubServiceConnection: 'sandman-sc-hub'
  location: 'southcentralus'
  resourceGroup: 'sandman-rg-${{ parameters.environment }}'
  parametersPath: 'infrastructure/parameters/${{ parameters.environment }}'
  vnetName: 'sandman-vnet-${{ parameters.environment }}'

stages:
  - stage: Deploy
    displayName: 'Deploy ${{ parameters.environment }} Environment'
    jobs:
      - job: DeployInfrastructure
        steps:
          # Create Resource Group
          - task: AzureCLI@2
            displayName: 'Create Resource Group'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az group create \
                  --subscription ${{ parameters.subscriptionId }} \
                  --name $(resourceGroup) \
                  --location $(location)

          

             
          # Create Key Vault
          - task: AzureCLI@2
            displayName: 'Create Keyvault'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az keyvault create \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --name sandman-kv-${{ parameters.environment }} \
                  --location $(location) \
                  --enable-rbac-authorization true \
                  --public-network-access disabled \
                  --tags app=sandman \
                  --retention-days 7 || echo "keyvault already exists, skipping"

          # Deploy VNet
          - task: AzureCLI@2
            displayName: 'Deploy VNet'
            condition: and(succeeded(), eq('${{ parameters.deployVnet }}', true))
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment group create \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --template-file infrastructure/modules/vnet.bicep \
                  --parameters $(parametersPath)/vnet.params.json \
                  --parameters environment=${{ parameters.environment }} \
                  --parameters location=$(location)

          # Peer Hub to Spoke
          - task: AzureCLI@2
            displayName: 'Peer Hub to Spoke'
            inputs:
              azureSubscription: $(hubServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Remote VNet: /subscriptions/${{ parameters.subscriptionId }}/resourceGroups/sandman-rg-${{ parameters.environment }}/providers/Microsoft.Network/virtualNetworks/sandman-vnet-${{ parameters.environment }}"

                az network vnet peering create \
                  --name sandman-peer-to-${{ parameters.environment }} \
                  --resource-group sandman-rg-hub \
                  --vnet-name sandman-vnet-hub \
                  --remote-vnet "/subscriptions/${{ parameters.subscriptionId }}/resourceGroups/sandman-rg-${{ parameters.environment }}/providers/Microsoft.Network/virtualNetworks/sandman-vnet-${{ parameters.environment }}" \
                  --allow-vnet-access true \
                  --allow-forwarded-traffic true || echo "Peering already exists, skipping"

          # Deploy ACR
          - task: AzureCLI@2
            displayName: 'Deploy ACR'
            condition: and(succeeded(), eq('${{ parameters.deployACR }}', true))
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                existing=$(az acr show \
                --subscription ${{ parameters.subscriptionId }} \
                --resource-group $(resourceGroup) \
                --name sandmanacr${{ parameters.environment }} \
                --query 'name' \
                --output tsv 2>/dev/null)

                if [ -n "$existing" ]; then
                  echo "ACR already exists, skipping deployment"
                else  
                  peSubnetId=$(az network vnet subnet show \
                    --subscription ${{ parameters.subscriptionId }} \
                    --resource-group $(resourceGroup) \
                    --vnet-name $(vnetName) \
                    --name sandman-snet-pe \
                    --query 'id' \
                    --output tsv)

                  vnetId=$(az network vnet show \
                    --subscription ${{ parameters.subscriptionId }} \
                    --resource-group $(resourceGroup) \
                    --name $(vnetName) \
                    --query 'id' \
                    --output tsv)

                  az deployment group create \
                    --subscription ${{ parameters.subscriptionId }} \
                    --resource-group $(resourceGroup) \
                    --template-file infrastructure/modules/acr.bicep \
                    --parameters $(parametersPath)/acr.params.json \
                    --parameters environment=${{ parameters.environment }} \
                    --parameters location=$(location) \
                    --parameters subnetId="$peSubnetId" \
                    --parameters vnetId="$vnetId"
                fi

          # Deploy Blob Cache Storage
          - task: AzureCLI@2
            displayName: 'Deploy Blob Cache Storage'
            condition: and(succeeded(), eq('${{ parameters.deployBlobCache }}', true))
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                existing=$(az storage account show \
                --subscription ${{ parameters.subscriptionId }} \
                --resource-group $(resourceGroup) \
                --name sandmanblobcache${{ parameters.environment }} \
                --query 'name' \
                --output tsv 2>/dev/null)

                if [ -n "$existing" ]; then
                  echo "blob cache already exists, skipping deployment"
                else                
                peSubnetId=$(az network vnet subnet show \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --vnet-name $(vnetName) \
                  --name sandman-snet-pe \
                  --query 'id' \
                  --output tsv)

                vnetId=$(az network vnet show \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --name $(vnetName) \
                  --query 'id' \
                  --output tsv)

                az deployment group create \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --template-file infrastructure/modules/blobcache.bicep \
                  --parameters $(parametersPath)/blobcache.params.json \
                  --parameters environment=${{ parameters.environment }} \
                  --parameters location=$(location) \
                  --parameters subnetId="$peSubnetId" \
                  --parameters vnetId="$vnetId"
                fi

          # Create RSV Resource Group (prod only)
          - task: AzureCLI@2
            displayName: 'Create RSV Resource Group'
            condition: eq('${{ parameters.environment }}', 'prod')
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az group create \
                  --subscription ${{ parameters.subscriptionId }} \
                  --name sandman-rg-rsv-${{ parameters.environment }} \
                  --location $(location)

          # Deploy Blob Perm Storage
          - task: AzureCLI@2
            displayName: 'Deploy Blob Perm Storage'
            condition: and(succeeded(), eq('${{ parameters.deployBlobPerm }}', true))
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                existing=$(az storage account show \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --name sandmanperm${{ parameters.environment }} \
                  --query 'name' \
                  --output tsv 2>/dev/null)

                if [ -n "$existing" ]; then
                  echo "blob perm already exists, skipping deployment"
                else               
                peSubnetId=$(az network vnet subnet show \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --vnet-name $(vnetName) \
                  --name sandman-snet-pe \
                  --query 'id' \
                  --output tsv)

                vnetId=$(az network vnet show \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --name $(vnetName) \
                  --query 'id' \
                  --output tsv)

                az deployment group create \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --template-file infrastructure/modules/blobperm.bicep \
                  --parameters $(parametersPath)/blobperm.params.json \
                  --parameters environment=${{ parameters.environment }} \
                  --parameters location=$(location) \
                  --parameters subnetId="$peSubnetId" \
                  --parameters vnetId="$vnetId"
                  fi

              # Deploy REDIS
          - task: AzureCLI@2
            displayName: 'Deploy redis'
            condition: and(succeeded(), eq('${{ parameters.deployRedis }}', true))
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                existing=$(az redisenterprise show\
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --name sandman-redis-${{ parameters.environment }} \
                  --query 'name' \
                  --output tsv 2>/dev/null)

                if [ -n "$existing" ]; then
                  echo "redis already exists, skipping deployment"
                else               
                peSubnetId=$(az network vnet subnet show \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --vnet-name $(vnetName) \
                  --name sandman-snet-pe \
                  --query 'id' \
                  --output tsv)

                vnetId=$(az network vnet show \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --name $(vnetName) \
                  --query 'id' \
                  --output tsv)

                az deployment group create \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --template-file infrastructure/modules/redis.bicep \
                  --parameters $(parametersPath)/redis.params.json \
                  --parameters environment=${{ parameters.environment }} \
                  --parameters location=$(location) \
                  --parameters subnetId="$peSubnetId" \
                  --parameters vnetId="$vnetId"
                fi
              # Deploy AKS
          - task: AzureCLI@2
            displayName: 'Deploy AKS'
            condition: and(succeeded(), eq('${{ parameters.deployAKS }}', true))
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                aksSubnetId=$(az network vnet subnet show \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --vnet-name $(vnetName) \
                  --name sandman-snet-aks \
                  --query 'id' \
                  --output tsv)

                vnetId=$(az network vnet show \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --name $(vnetName) \
                  --query 'id' \
                  --output tsv)

                acrId=$(az acr show \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --name sandmanacr${{ parameters.environment }} \
                  --query 'id' \
                  --output tsv)

                az deployment group create \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --template-file infrastructure/modules/aks.bicep \
                  --parameters $(parametersPath)/aks.params.json \
                  --parameters environment=${{ parameters.environment }} \
                  --parameters location=$(location) \
                  --parameters aksSubnetId="$aksSubnetId" \
                  --parameters acrId="$acrId" \

              # Assign Network Contributor to AKS UAMI
          - task: AzureCLI@2
            displayName: 'Assign Network Contributor to AKS UAMI'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                uamiPrincipalId=$(az identity show \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --name sandman-uami-aks-${{ parameters.environment }} \
                  --query 'principalId' \
                  --output tsv)

                vnetId=$(az network vnet show \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --name $(vnetName) \
                  --query 'id' \
                  --output tsv)

                az role assignment create \
                  --assignee $uamiPrincipalId \
                  --role 'Network Contributor' \
                  --scope $vnetId \
                  --subscription ${{ parameters.subscriptionId }} || echo "Role assignment already exists, skipping"

              # Attach ACR to AKS
          - task: AzureCLI@2
            displayName: 'Attach ACR to AKS'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks update \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --name sandman-aks-${{ parameters.environment }} \
                  --attach-acr sandmanacr${{ parameters.environment }}