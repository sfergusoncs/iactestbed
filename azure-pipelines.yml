# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger: none

parameters:
  - name: environment
    displayName: 'Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - uat
      - qa
      - prod
      - sandbox

  - name: subscriptionId
    displayName: 'Target Subscription ID'
    type: string
    default: ''

pool:
  vmImage: ubuntu-latest

variables:
  serviceConnection: 'sandmansandbox'
  resourceGroup: 'sandman-rg-sandbox'
  location: 'southcentralus'

stages:
  - stage: Deploy_Sandbox
    displayName: 'Deploy Sandbox Environment'
    jobs:
      - job: DeployInfrastructure
        steps:
          # Step 1 - Create Resource Group first
          - task: AzureCLI@2
            displayName: 'Create Resource Group'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az group create \
                  --name $(resourcegroup) \
                  --location southcentralus

          # Step 2 - Deploy VNet into that RG
          - task: AzureCLI@2
            displayName: 'Validate VNet'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment group what-if \
                  --resource-group $(resourceGroup) \
                  --template-file infrastructure/modules/vnet.bicep \
                  --parameters infrastructure/parameters/sandbox/vnet.params.json

          - task: AzureCLI@2
            displayName: 'Deploy VNet'
            inputs:
               azureSubscription: $(serviceConnection)
               scriptType: 'bash'
               scriptLocation: 'inlineScript'
               inlineScript: |
                  az deployment group create \
                    --resource-group sandman-rg-sandbox \
                    --template-file infrastructure/modules/vnet.bicep \
                    --parameters infrastructure/parameters/sandbox/vnet.params.json
