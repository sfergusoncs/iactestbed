# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger: none

parameters:
  - name: environment
    displayName: 'Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - uat
      - prod
      - sandbox

  - name: subscriptionId
    displayName: 'Target Subscription ID'
    type: string
    default: ''

pool:
  vmImage: ubuntu-latest

variables:
  serviceConnection: 'sandman-${{ parameters.environment }}-sc'
  location: 'southcentralus'
  resourceGroup: 'sandman-rg-${{ parameters.environment }}'
  parametersPath: 'infrastructure/parameters/${{ parameters.environment }}'

stages:
  - stage: Deploy
    displayName: 'Deploy ${{ parameters.environment }} Environment'
    jobs:
      - job: DeployInfrastructure
        steps:
          # Create Resource Group first
          - task: AzureCLI@2
            displayName: 'Create Resource Group'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az group create \
                  --subscription ${{ parameters.subscriptionId }} \
                  --name $(resourceGroup) \
                  --location $(location)

          # Create a Keyvault in that RG
          - task: AzureCLI@2
            displayName: 'Create Keyvault'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az keyvault create \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --name sandman-kv-${{ parameters.environment }} \
                  --location $(location) \
                  --enable-rbac-authorization true \
                  --public-network-access disabled \
                  --tags app=sandman \
                  --retention-days 7 || echo "keyvault already exists, skipping"


          # Validate a vnet can be deployed
          - task: AzureCLI@2
            displayName: 'Validate VNet'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment group what-if \
                  --subscription ${{ parameters.subscriptionId }} \
                  --resource-group $(resourceGroup) \
                  --template-file infrastructure/modules/vnet.bicep \
                  --parameters $(parametersPath)/vnet.params.json \
                  --parameters environment=${{ parameters.environment }} \
                  --parameters location=$(location)
                  
          # Create Vnet and capture outputs
          - task: AzureCLI@2
            name: deployVnet
            displayName: 'Deploy VNet'
            inputs:
               azureSubscription: $(serviceConnection)
               scriptType: 'bash'
               scriptLocation: 'inlineScript'
               inlineScript: |
                  az deployment group create \
                      --subscription ${{ parameters.subscriptionId }} \
                      --resource-group $(resourceGroup) \
                      --template-file infrastructure/modules/vnet.bicep \
                      --parameters $(parametersPath)/vnet.params.json \
                      --parameters environment=${{ parameters.environment }} \
                      --parameters location=$(location)

                  vnetId=$(az network vnet show \
                      --subscription ${{ parameters.subscriptionId }} \
                      --resource-group $(resourceGroup) \
                      --name sandman-vnet-${{ parameters.environment }} \
                      --query 'id' \
                      --output tsv)

                  peSubnetId=$(az network vnet subnet show \
                      --subscription ${{ parameters.subscriptionId }} \
                      --resource-group $(resourceGroup) \
                      --vnet-name sandman-vnet-${{ parameters.environment }} \
                      --name sandman-snet-pe \
                      --query 'id' \
                      --output tsv)

                  echo "##vso[task.setvariable variable=vnetId;isOutput=true]$vnetId"
                  echo "##vso[task.setvariable variable=peSubnetId;isOutput=true]$peSubnetId"

            # deploy ACR
          - task: AzureCLI@2
            displayName: 'Deploy ACR'
            inputs:
               azureSubscription: $(serviceConnection)
               scriptType: 'bash'
               scriptLocation: 'inlineScript'
               inlineScript: |
                  az deployment group create \
                    --subscription ${{ parameters.subscriptionId }} \
                    --resource-group $(resourceGroup) \
                    --template-file infrastructure/modules/acr.bicep \
                    --parameters $(parametersPath)/acr.params.json \
                    --parameters environment=${{ parameters.environment }} \
                    --parameters location=$(location) \
                    --parameters subnetId='$(DeployInfrastructure.deployVnet.peSubnetId)' \
                    --parameters vnetId='$(DeployInfrastructure.deployVnet.vnetId)'
